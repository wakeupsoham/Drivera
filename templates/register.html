{% extends "base.html" %}
{% block title %}Sign Up — Drivera{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Sign up to start booking fleets for your business.</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Create a strong password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="company_name">Company Name</label>
                <input type="text" class="form-control" id="company_name" name="company_name" placeholder="Your company name">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group">
                    <label for="contact">Phone</label>
                    <input type="tel" class="form-control" id="contact" name="contact" placeholder="9876543210">
                </div>
                <div class="form-group">
                    <label for="license_no">License No.</label>
                    <input type="text" class="form-control" id="license_no" name="license_no" placeholder="MH01-XXXX">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerSubmit">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
